<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Halcyon</title>
    <link rel="stylesheet"href="styles.css">
  </head>

  <body>
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h2>SIDEBAR</h2>

            <ul>
                <li>Home</li>
                <li>Recent</li>
                <li>Library</li>
                <li>Settings</li>
            </ul>

        </aside>
        <!--Main Content-->
        <main class="main-content">
            <!--Search-->
            <div class="search-bar">
                <input type="text" placeholder="Search Library...">
            </div>
            <!--Album section-->
            <section class="albums">
                <h2>Your Albums</h2>
                <div class="album-row">
                    <div class="album-card"></div>
                    <div class="album-card"></div>
                    <div class="album-card"></div>
                    <div class="album-card"></div>
                    <div class="album-card"></div>
                </div>
            </section>
            <!--REcommended songs-->
            <section class="recommended-songs">
                <h2>Recommended Songs</h2>
                <div class="song-row">
                 <div class="song-card">
                    Song 1
                 </div>
                 <div class="song-card">
                    Song 2
                 </div>
                </div>
            </section>
            <!--Music player-->
            <footer class="player">
                <div class="song-info"> 
                    Song Title
                </div>
                <div class="controls">
                    <button>⏮</button>
                    <button>▶</button>
                    <button>⏭</button>
                </div>
            </footer>
        </main>
    </div>
 </body>
</html>
